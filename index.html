(function() {
  // Единая точка входа для всех запросов — Worker, который хранит все секреты

  const SYSTEM = `Ты — профессиональный менеджер компании ARMADA (ООО АРМАДА). Компания поставляет инженерное оборудование и строительные материалы для крупных строительных проектов в России. Прямые поставки от производителя на объект. Работаем как со строительными компаниями и юридическими лицами, так и с частными клиентами.

АССОРТИМЕНТ ARMADA:
- FRESE (Дания) — балансировочные клапаны HVAC, в том числе COMBIFLOW 6-way (см. подробности ниже)

ПОДРОБНАЯ ИНФОРМАЦИЯ О FRESE COMBIFLOW (балансировочные клапаны для HVAC):
FRESE COMBIFLOW 6-way — это запатентованный 6-ходовой клапан независимый от давления (PICV) для 4-трубных систем охлаждения и отопления. Один клапан и один привод обеспечивают переключение между нагревом и охлаждением, а также модулирующее регулирование расхода — без перетока между контурами.

Ключевые особенности COMBIFLOW 6-way:
- Класс давления PN25, максимальный перепад давления 400 кПа (4 бар)
- Диапазон температуры среды: 0–90°C
- Корпус из латуни DZR (CW602N), устойчивой к обесцинкованию
- Встроенный регулятор перепада давления (DP) обеспечивает 100% авторитет клапана
- Сменный DP-картридж для удобной промывки на полном расходе
- Только одна точка данных (data point) для подключения к BMS
- Поддержка управления через 0-10 V, 4-20 mA, BACnet MS/TP, Modbus RTU
- Раздельные предустановки расхода для нагрева и охлаждения через BACnet/Modbus
- Встроенный сброс давления в закрытом положении (для расширения/сжатия среды)
- Допустимы смеси гликоля до 50% (этилен и пропилен)

Типоразмеры и расходы COMBIFLOW 6-way:
- DN15 Low: расход 30–830 л/ч, артикул 53-1839, резьба M/M G3/4, вес 1.9 кг
- DN15: расход 210–1200 л/ч, артикул 53-1844, резьба M/M G3/4, вес 1.9 кг
- DN20: расход 460–4250 л/ч, артикул 53-1845, резьба M/M G1, вес 3.4 кг

Применение COMBIFLOW: 4-трубные системы для отопления и охлаждения через radiant панели (тёплые полы/потолки), децентрализованные вентиляционные установки, фанкойлы (fan coil), конвекционные установки нагрева и охлаждения.

Приводы COMBIFLOW:
1. Analog Rotary Actuator (артикул 48-5397) — аналоговый, 0-10V, питание 24V AC/DC, крутящий момент 5 Nm, время хода 150 с, IP54, кабель 0.9 м заводской, мощность 1.2 W при работе
2. Multi Rotary Actuator (артикулы 48-5394 с кабелем / 48-5395 без кабеля) — комбинированный аналоговый и цифровой, поддерживает 0(2)-10V, (0)4-20mA, BACnet MS/TP, Modbus RTU, питание 24V AC/DC, крутящий момент 5 Nm, время хода 45 с, IP54, функция dew point sensor (датчик точки росы), backup mode при потере связи

Преимущества клиенту: устраняет переток между контурами при колебаниях давления; одна позиция вместо двух клапанов с двумя приводами и без отдельного датчика расхода — снижает стоимость BOM и риск утечек; компактное решение, балансировочные клапаны или дополнительные PICV не требуются; большие проходные сечения дают минимальные потери давления (наименьшие среди 6-ходовых решений) — экономия на насосе и энергии.

ПОДРОБНАЯ ИНФОРМАЦИЯ О KESSEL — ЖИРООТДЕЛИТЕЛИ:
Компания KESSEL основана в 1963 г. в Германии (г. Лентинг). Made in Germany. Стандарт EN 1825. Гарантия на полиэтилен — 20 лет. Гарантия на насосное оборудование — 2 года. Гарантию можно продлить: каждый дополнительный год оформляется при условии предоплаты. Точные условия продления уточнит менеджер.

Линейки жироотделителей KESSEL:
1. EasyClean free Basic (NS 2–10) — экономичная серия: Standard (ручная откачка) и Direct (прямая откачка без открытия бака).
2. EasyClean free (NS 2–30) — продвинутая серия. Системы откачки: Standard, Direct, Mix, Auto Mix, Mix & Pump, Auto Mix & Pump (полный автомат). Опция SonicControl — ультразвуковой контроль уровня жира.
3. EasyClean Modular (NS 0.25–4) — модульная серия, разбирается на части, проходит в проём 58 см. Идеально для реконструкции.
4. EasyClean ground (NS 1–35) — подземная установка вне здания. Экономит место внутри помещения.

Принцип работы: гравитационное разделение — жир всплывает, осадок оседает, очищенная вода выходит. Полиэтилен устойчив к агрессивным жирным кислотам.
Применение KESSEL: рестораны, отели, больницы, столовые, мясоперерабатывающие предприятия. Установка обязательна по закону.

4. Если клиент описывает свою задачу (например: «мне нужен жироотделитель для ресторана на 50 посадочных мест») — подбери из базы знаний подходящую модель и укажи её артикул, если он есть.
5. Все артикулы в твоей базе — это реальные коды продукции. Передавай их без изменений символ в символ.

СТИЛЬ ОБЩЕНИЯ: формальный, профессиональный, вежливый. Обращайся к пользователю на «Вы». Отвечай коротко и по делу — 2–4 предложения. Не используй эмодзи и неформальные восклицания типа «Отлично!», «Супер!». Для точного расчёта предлагай связаться с менеджером. Если клиент хочет оставить заявку или связаться — напиши только слово SHOW_LEAD_FORM на отдельной строке. Отвечай на том же языке, на котором задал вопрос пользователь (русский, английский, турецкий или любой другой). По умолчанию — русский.`;

  function detectLang(text) {
    if (!text || text.length < 2) return currentLang;
    // Турецкие специфичные символы — турецкий
    if (/[ğĞşŞçÇöÖüÜ]/.test(text)) return 'tr';
    // Азербайджанские специфичные символы (ə, Ə, x, q вне начала, ğ) — для UI используем турецкий (близкий)
    if (/[əƏ]/.test(text)) return 'tr';
    // Узбекские и казахские с диакритикой (oʻ, gʻ, қ, ң, ұ, ү, һ) — для UI турецкий
    if (/[қңұүһҚҢҰҮҺ]/.test(text)) return 'tr';
    if (/oʻ|gʻ|o['ʼ]|g['ʼ]/i.test(text)) return 'tr';
    // Кириллица — русский
    if (/[а-яА-ЯёЁ]/.test(text)) return 'ru';
    // Латиница: проверяем сначала турецкие слова без диакритики, потом английские
    if (/[a-zA-Z]/.test(text)) {
      // Расширенный список турецких слов и их частей (включая технические термины и без диакритики)
      const trWords = /\b(merhaba|selam|nasil|nasılsınız|ne|nedir|var|yok|evet|hayir|hayır|tesekkur|teşekkür|lutfen|lütfen|fiyat|fiyatı|urun|ürün|nerede|kim|kac|kaç|hangi|icin|için|ile|ben|biz|siz|onlar|bu|şu|var mı|olabilir|alabilir|istiyorum|istiyoruz|gerek|lazim|lazım|musun|misin|miyim|merhabalar|gunaydin|günaydın|iyi|kotu|kötü|buyuk|büyük|kucuk|küçük|yeni|eski|magaza|mağaza|sirket|şirket|sat[ıi]n|teklif|katalog|model|tip|olcu|ölçü|boyut|fiyat[ıi]|maliyet|teslim|teslimat|sipari[sş]|sipariş|gonder|gönder|verir|alir|alır|hakk[ıi]nda|bilgi|yard[ıi]m|sorabilir|gorebilir|görebilir|olusturmak|oluşturmak|nas[ıi]l|kullanim|kullanım|ozellik|özellik|gorebilirim|hizmet|hizmetler|adres|telefon|posta|musteri|müşteri|destek|saat|gun|gün|hafta|ay|yil|yıl|listele|gosterebilir|gösterebilir|yagayirici|yag|yağ|ayirici|ayırıcı|vana|valve|sicaklik|sıcaklık|basinc|basınç|akis|akış|debi|kapasite|sistem|tesisat|yapilanma|projemiz|projeye|projesinde|kurulum|montaj|teknoloji|teknik|servis|garanti|sertifika|standart|kalite|markalar|tedarik|distribütör|markamız|firmamız|teklifimiz|sunabilir|sunmak|saglar|sağlar|verir|kapasiteli|gorebiliriz|gorusebilir|görüşebilir|görebilir|gorebilirsiniz|salam)\b/i;
      // Английские частые слова — индикатор английского
      const enWords = /\b(the|is|are|am|have|has|had|will|would|could|should|can|could|may|might|do|does|did|need|needs|want|wants|hello|hi|hey|good|please|thanks|thank you|how|what|where|when|why|which|who|i|you|we|they|this|that|these|those|for|with|from|about|product|catalog|price|order|company|service|support|model|brand|delivery|installation|technical|specification|valve|grease|separator|pump|station|drainage|heating|cooling|hvac)\b/i;

      const trMatches = (text.match(trWords) || []).length;
      const enMatches = (text.match(enWords) || []).length;

      if (trMatches > enMatches) return 'tr';
      if (enMatches > 0) return 'en';
      // Если не нашли явных слов — определяем по доменным маркерам
      // Турецкие окончания "lar", "ler", "iyor", "miş" и др. часто встречаются
      if (/\b\w+(lar|ler|iyor|mis|mış|mek|mak|leri|lari|lar[ıi]|ler[ıi])\b/i.test(text)) return 'tr';
      return 'en';
    }
    return currentLang;
  }

  const history = [];
  let leadShown = false;
  let isOpen = false;
  let initialized = false;
  let currentLang = 'ru';

  // Уникальный ID сессии — один на всю историю общения посетителя.

  const SESSION_ID = 'S-' + Date.now().toString(36) + '-' + Math.random().toString(36).substr(2, 6);

  window.armadaToggleChat = function() {

  function esc(t) {

  window.armadaSubmitLead = function() {

    // === Отправка заявки в Telegram + Sheets через Worker ===
    sendToWorker('lead', {
      name: name,

      session: SESSION_ID
    });
  };

  // Хелпер: попытка fetch с автоматическим повтором при сетевых ошибках
  async function fetchWithRetry(url, options, maxRetries) {
    maxRetries = maxRetries || 3;
    let lastError;
    for (var i = 0; i < maxRetries; i++) {
      try {
        const res = await fetch(url, options);
        // 5xx ошибки сервера — тоже стоит повторить
        if (res.status >= 500 && res.status < 600 && i < maxRetries - 1) {
          await new Promise(function(r) { setTimeout(r, 800 * (i + 1)); });
          continue;
        }
        return res;
      } catch (e) {
        lastError = e;
        // Сетевые ошибки (ERR_CONNECTION_CLOSED, ERR_NETWORK и т.д.) — повторяем
        if (i < maxRetries - 1) {
          await new Promise(function(r) { setTimeout(r, 800 * (i + 1)); });
          continue;
        }
      }
    }
    throw lastError;
  }

  async function callGemini(userMsg) {
    currentLang = detectLang(userMsg);
    // Универсальная инструкция: отвечай на ТОМ ЖЕ языке что и пользователь
    const langInstruction = `КРИТИЧЕСКИ ВАЖНОЕ ПРАВИЛО ЯЗЫКА (САМОЕ ВАЖНОЕ В ЭТОМ ЗАДАНИИ):

Ты ВСЕГДА отвечаешь ТОЧНО на том же языке и в том же варианте языка, на котором написал пользователь. Это правило главнее всех остальных.

Конкретные правила:
- Если пользователь пишет на турецком (Türkçe) — отвечай ТОЛЬКО на турецком (Türkçe). НЕ переходи на узбекский, казахский, азербайджанский, туркменский или другой тюркский язык.
- Если пользователь пишет на азербайджанском (Azərbaycan dili) — отвечай ТОЛЬКО на азербайджанском. НЕ путай с турецким.
- Если пользователь пишет на узбекском (Oʻzbek tili) — отвечай ТОЛЬКО на узбекском. НЕ путай с турецким.
- Если пользователь пишет на казахском (Қазақ тілі) — отвечай ТОЛЬКО на казахском.
- Если пользователь пишет на русском — отвечай ТОЛЬКО на русском.
- Если пользователь пишет на английском — отвечай ТОЛЬКО на английском.
- Для ЛЮБОГО другого языка (немецкий, итальянский, французский, арабский, китайский и т.д.) — отвечай ровно на нём.

Перед каждым ответом мысленно определи язык пользователя по его последнему сообщению и проверь что весь твой ответ написан НА ТОМ ЖЕ языке, без вкраплений других языков. Не смешивай языки в одном ответе.

Если в одном чате пользователь меняет язык — ты тоже меняешь язык ответа.`;
    const dynamicSystem = SYSTEM + '\n\n' + langInstruction;
    history.push({ role: 'user', parts: [{ text: userMsg }] });

    // === Лог сообщения клиента (через Worker, тихо в фоне) ===
    sendToWorker('log', {
      message: userMsg,
      lang: currentLang,
      page: location.href || '',
      session: SESSION_ID
    });

    showTyping();
    try {
      const res = await fetchWithRetry(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'chat',
          payload: {
            system_instruction: { parts: [{ text: dynamicSystem }] },
            contents: history,
            generationConfig: { maxOutputTokens: 1500, temperature: 0.7 }
          }
        })
      }, 3);
      const data = await res.json();
      removeTyping();
      let reply = (data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0] && data.candidates[0].content.parts[0].text) || '';
      if (!reply) {
        addBot(T[currentLang].noResponse);
        return;
      }
      history.push({ role: 'model', parts: [{ text: reply }] });

      if (reply.indexOf('SHOW_LEAD_FORM') !== -1) {
        const clean = reply.replace('SHOW_LEAD_FORM', '').trim();
        if (clean) addBotStreaming(clean);
        setTimeout(showLeadForm, 400);
      } else {
        addBotStreaming(reply);
        const lc = userMsg.toLowerCase();
        const triggers = ['заявк','контакт','менеджер','заказ','связ',
                          'request','contact','manager','order','reach',
                          'talep','iletişim','iletisim','yönetici','yonetici','sipariş','siparis'];
        if (!leadShown && triggers.some(function(tr){ return lc.indexOf(tr) !== -1; })) {
          setTimeout(showLeadForm, 700);
        }
      }
    } catch(e) {
      removeTyping();
      addBot(T[currentLang].errorMsg);
    }
  }

  // Streaming-эффект: показывает ответ постепенно по группам символов
  function addBotStreaming(text) {
    const box = document.getElementById('armada-messages');
    const d = document.createElement('div');
    d.className = 'msg bot';
    d.innerHTML = '<div class="av">AR</div><div class="bubble"></div>';
    box.appendChild(d);
    const bubble = d.querySelector('.bubble');
    box.scrollTop = box.scrollHeight;

    let i = 0;
    const chunk = 1; // 1 символ за шаг — плавная печать без рывков
    const speed = 18; // мс между шагами (~55 символов/сек, комфортно для чтения)

    function step() {
      if (i >= text.length) return;
      i = Math.min(i + chunk, text.length);
      bubble.innerHTML = esc(text.slice(0, i));
      box.scrollTop = box.scrollHeight;
      if (i < text.length) {
        setTimeout(step, speed);
      }
    }
    step();
  }

  window.armadaSendMessage = function() {
    const inp = document.getElementById('armada-user-input');
    const txt = inp.value.trim();
    if (!txt) return;
    addUser(txt);
    inp.value = '';
    callGemini(txt);
  };

    if (!isOpen) window.armadaToggleChat();

    if (txt === 'Связаться с менеджером') { if (!leadShown) showLeadForm(); return; }
    addUser(txt);
    callGemini(txt);

  window.armadaHandleKey = function(e) {
